<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가이드 상세 - Chat Space</title>
  <link rel="stylesheet" href="/common-ui/chat-vue.css">
  <link rel="stylesheet" href="/css/chat.css">
  <script src="/vendor/vue.global.prod.js"></script>
  <script src="/vendor/axios.min.js"></script>
  <script src="/common-ui/common-ui.umd.js"></script>
  <script src="/vendor/marked.min.js"></script>
</head>
<body class="h-screen flex overflow-hidden bg-white dark:bg-[#131314] font-sans antialiased">

  <!-- 사이드바 프래그먼트 -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- 사이드바 접혔을 때 펼치기 버튼 -->
  <button id="sidebarToggleBtn" onclick="toggleSidebar()" title="사이드바 펼치기"
          class="absolute left-3 top-4 z-10 w-8 h-8 flex items-center justify-center bg-white dark:bg-[#1e1f20] border border-white/20 dark:border-white/10 rounded-lg shadow-sm hover:shadow-md hover:bg-gray-50 dark:hover:bg-[#2a2b2c] text-gray-500 dark:text-gray-400 transition-all duration-220">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
    </svg>
  </button>

  <!-- ====== Vue 앱 영역 (가이드 상세) ====== -->
  <main id="guideDetailApp" v-cloak class="flex-1 overflow-y-auto bg-white dark:bg-[#131314]">

    <!-- 로딩 상태 -->
    <div v-if="isLoading" class="h-full flex items-center justify-center">
      <div class="text-center">
        <svg class="w-9 h-9 spin text-blue-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">가이드를 불러오는 중...</p>
      </div>
    </div>

    <!-- 에러 상태 -->
    <div v-else-if="error" class="p-8 max-w-4xl mx-auto">
      <div class="bg-white dark:bg-[#1e1f20] border border-red-200 dark:border-red-800/50 rounded-2xl p-6 flex items-start gap-4 backdrop-blur-sm">
        <svg class="w-6 h-6 text-red-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div>
          <p class="text-sm font-semibold text-red-600 dark:text-red-400">오류가 발생했습니다</p>
          <p class="text-xs text-red-600 dark:text-red-400 mt-1" v-text="error"></p>
        </div>
      </div>
    </div>

    <!-- 가이드 상세 콘텐츠 -->
    <div v-else-if="guide" class="p-8 max-w-4xl mx-auto">

      <!-- 1행: 목록으로 이동 | 수정/삭제 버튼 -->
      <div class="flex items-center justify-between mb-6">
        <a href="/guide" class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 font-medium flex items-center gap-1 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          목록
        </a>
        <div v-if="guide.isMine" class="flex gap-2">
          <a :href="`/guide/${guide.guideSeq}/edit`" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">수정</a>
          <button @click="deleteGuide" class="px-4 py-2 border border-red-300 dark:border-red-700 rounded-lg text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">삭제</button>
        </div>
      </div>

      <!-- 2행: 제목 -->
      <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-4 leading-tight" v-text="guide.title"></h1>

      <!-- 3행: 메타 (아바타+이름+날짜+공개뱃지 | 좋아요버튼) -->
      <div class="flex items-center gap-4 pb-6 border-b border-gray-200 dark:border-gray-700 mb-8">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-full flex items-center justify-center flex-shrink-0 text-white font-semibold text-sm"
             v-text="guide.authorName.charAt(0)"></div>
        <div>
          <p class="font-semibold text-gray-900 dark:text-gray-100" v-text="guide.authorName"></p>
          <p class="text-sm text-gray-500 dark:text-gray-400" v-text="formatDate(guide.createdAt)"></p>
        </div>
        <span v-if="guide.isPublic === 'Y'" class="bg-green-100 dark:bg-green-900/40 text-green-800 dark:text-green-400 text-xs font-semibold px-3 py-1 rounded-full">공개</span>
        <span v-else class="bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 text-xs font-semibold px-3 py-1 rounded-full">비공개</span>
        <div class="ml-auto">
          <!-- 좋아요 버튼 -->
          <button @click="toggleLike"
                  :disabled="isLiking"
                  class="flex items-center gap-2 px-5 py-2 rounded-lg text-sm font-semibold transition-colors duration-200"
                  :class="guide.myLiked
                    ? 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/50'
                    : 'bg-gray-50 dark:bg-gray-800/50 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50'">
            <svg v-if="guide.myLiked" class="w-4 h-4 fill-current" viewBox="0 0 24 24">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <svg v-else class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            <span v-text="`${guide.likeCount}`"></span>
          </button>
        </div>
      </div>

      <!-- 4행: 마크다운 본문 -->
      <div class="markdown-body mb-8" v-html="renderedContent" @click="handleMarkdownLinks"></div>

      <!-- 5행: 첨부파일 (있을 경우) - 심플 스타일 -->
      <div v-if="guide.files && guide.files.length > 0" class="bg-gray-50 dark:bg-[#1e1f20] p-4 rounded-lg mb-8">
        <h3 class="font-semibold text-gray-900 dark:text-gray-100 mb-3">첨부파일</h3>
        <div class="space-y-2">
          <a v-for="file in guide.files"
             :key="file.fileSeq"
             :href="`/api/file/${file.fileSeq}/download`"
             class="flex items-center gap-3 p-2 hover:bg-gray-100 dark:hover:bg-[#2a2b2c] rounded-lg cursor-pointer transition-colors">
            <div class="w-6 h-6 bg-blue-100 dark:bg-blue-900/30 rounded flex items-center justify-center flex-shrink-0">
              <svg class="w-3.5 h-3.5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" v-text="file.originalName"></p>
              <p class="text-xs text-gray-500 dark:text-gray-400" v-text="formatFileSize(file.fileSize)"></p>
            </div>
          </a>
        </div>
      </div>

      <!-- 6행: 댓글 섹션 (border-t 구분선만, 카드 없음) -->
      <div class="border-t border-gray-200 dark:border-gray-700 pt-8">
        <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-6">댓글 <span v-text="`${totalComments}`"></span></h3>

        <!-- 댓글 등록 폼 -->
        <div class="space-y-3 pb-6 mb-8">
          <textarea v-model="newComment"
                    placeholder="댓글을 남겨주세요..."
                    class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent transition-all duration-220 resize-none"
                    rows="3" writingsuggestions="false" spellcheck="false"></textarea>
          <div class="flex justify-end">
            <button @click="addComment"
                    :disabled="!newComment.trim() || isCommentSubmitting"
                    class="px-5 py-2 rounded-lg text-sm font-semibold transition-colors duration-200"
                    :class="newComment.trim() && !isCommentSubmitting
                      ? 'bg-blue-600 hover:bg-blue-700 text-white'
                      : 'bg-gray-100 dark:bg-gray-800 text-gray-400 dark:text-gray-600 cursor-not-allowed'"
                    disabled:opacity-50 disabled:cursor-not-allowed>
              <span v-if="isCommentSubmitting" class="flex items-center gap-2">
                <svg class="w-4 h-4 spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                등록 중...
              </span>
              <span v-else>댓글 등록</span>
            </button>
          </div>
        </div>

        <!-- 댓글 목록 -->
        <div v-if="comments.length > 0" class="space-y-6">
          <div v-for="comment in comments" :key="comment.commentSeq" class="comment-item">

            <!-- 루트 댓글 -->
            <div class="border-b border-gray-100 dark:border-gray-700/30 pb-6">
              <div class="flex items-start justify-between gap-4">
                <div class="flex-1">
                  <!-- 헤더: 이름, 날짜 -->
                  <div class="flex items-center gap-2 mb-2">
                    <span class="text-sm font-semibold text-gray-900 dark:text-gray-100" v-text="comment.authorName"></span>
                    <span class="text-xs text-gray-400 dark:text-gray-500" v-text="formatDate(comment.createdAt)"></span>
                  </div>

                  <!-- 댓글 콘텐츠 (편집 모드 아닐 때) -->
                  <p v-if="editingCommentId !== comment.commentSeq"
                     class="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed" v-text="comment.content"></p>

                  <!-- 댓글 편집 폼 -->
                  <div v-else class="space-y-2 mt-2">
                    <textarea v-model="editingCommentContent"
                              class="w-full px-3 py-2 rounded-lg bg-white dark:bg-[#1e1f20] border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"
                              rows="2" writingsuggestions="false" spellcheck="false"></textarea>
                    <div class="flex gap-2">
                      <button @click="updateComment(comment.commentSeq)"
                              :disabled="!editingCommentContent.trim() || isCommentUpdating"
                              class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white disabled:bg-gray-300 dark:disabled:bg-gray-700 disabled:cursor-not-allowed transition-colors duration-200">
                        저장
                      </button>
                      <button @click="cancelEditComment"
                              class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200">
                        취소
                      </button>
                    </div>
                  </div>
                </div>

                <!-- 액션 버튼들 (답글, 수정, 삭제) -->
                <div class="flex gap-3 flex-shrink-0 text-xs">
                  <button v-if="editingCommentId !== comment.commentSeq"
                          @click="showReplyForm(comment.commentSeq)"
                          class="text-blue-500 hover:text-blue-600 font-medium hover:underline transition-colors">
                    답글
                  </button>
                  <button v-if="comment.isMine && editingCommentId !== comment.commentSeq"
                          @click="startEditComment(comment.commentSeq, comment.content)"
                          class="text-blue-500 hover:text-blue-600 font-medium hover:underline transition-colors">
                    수정
                  </button>
                  <button v-if="comment.isMine"
                          @click="deleteComment(comment.commentSeq)"
                          class="text-red-500 hover:text-red-600 font-medium hover:underline transition-colors">
                    삭제
                  </button>
                </div>
              </div>

              <!-- 답글 폼 -->
              <div v-if="replyingToCommentId === comment.commentSeq" class="mt-4 pt-4 border-t border-gray-300 dark:border-gray-600">
                <div class="space-y-2">
                  <textarea v-model="replyContent"
                            placeholder="답글을 입력하세요..."
                            class="w-full px-3 py-2 rounded-lg bg-white dark:bg-[#1e1f20] border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-100 text-sm placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"
                            rows="2" writingsuggestions="false" spellcheck="false"></textarea>
                  <div class="flex gap-2">
                    <button @click="addReply(comment.commentSeq)"
                            :disabled="!replyContent.trim() || isReplySubmitting"
                            class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors duration-200"
                            :class="replyContent.trim() && !isReplySubmitting
                              ? 'bg-blue-600 hover:bg-blue-700 text-white'
                              : 'bg-gray-100 dark:bg-gray-800 text-gray-400 dark:text-gray-600 cursor-not-allowed'">
                      <span v-if="isReplySubmitting">등록 중...</span>
                      <span v-else>답글 등록</span>
                    </button>
                    <button @click="cancelReplyForm"
                            class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200">
                      취소
                    </button>
                  </div>
                </div>
              </div>

              <!-- 대댓글 목록 -->
              <div v-if="comment.replies && comment.replies.length > 0" class="ml-12 mt-4 space-y-3">
                <div v-for="reply in comment.replies" :key="reply.commentSeq" class="border-l border-gray-200 dark:border-gray-700/30 pl-4">
                  <div class="flex items-start justify-between gap-4">
                    <div class="flex-1">
                      <!-- 헤더: 답글 아이콘, 이름, 날짜 -->
                      <div class="flex items-center gap-2 mb-2">
                        <svg class="w-3.5 h-3.5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 10h10a8 8 0 018 8v2M3 10l6-6m-6 6l-6-6"/>
                        </svg>
                        <span class="text-sm font-semibold text-gray-900 dark:text-gray-100" v-text="reply.authorName"></span>
                        <span class="text-xs text-gray-400 dark:text-gray-500" v-text="formatDate(reply.createdAt)"></span>
                      </div>

                      <!-- 대댓글 콘텐츠 (편집 모드 아닐 때) -->
                      <p v-if="editingCommentId !== reply.commentSeq"
                         class="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed" v-text="reply.content"></p>

                      <!-- 대댓글 편집 폼 -->
                      <div v-else class="space-y-2 mt-2">
                        <textarea v-model="editingCommentContent"
                                  class="w-full px-3 py-2 rounded-lg bg-gray-50 dark:bg-[#2a2b2c] border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"
                                  rows="2" writingsuggestions="false" spellcheck="false"></textarea>
                        <div class="flex gap-2">
                          <button @click="updateComment(reply.commentSeq)"
                                  :disabled="!editingCommentContent.trim() || isCommentUpdating"
                                  class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white disabled:bg-gray-300 dark:disabled:bg-gray-700 disabled:cursor-not-allowed transition-colors duration-200">
                            저장
                          </button>
                          <button @click="cancelEditComment"
                                  class="px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-200">
                            취소
                          </button>
                        </div>
                      </div>
                    </div>

                    <!-- 액션 버튼 -->
                    <div class="flex gap-3 flex-shrink-0 text-xs">
                      <button v-if="reply.isMine && editingCommentId !== reply.commentSeq"
                              @click="startEditComment(reply.commentSeq, reply.content)"
                              class="text-blue-500 hover:text-blue-600 font-medium hover:underline transition-colors">
                        수정
                      </button>
                      <button v-if="reply.isMine"
                              @click="deleteComment(reply.commentSeq)"
                              class="text-red-500 hover:text-red-600 font-medium hover:underline transition-colors">
                        삭제
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 댓글 없음 -->
        <div v-else class="text-center py-12">
          <svg class="w-10 h-10 text-gray-300 dark:text-gray-600 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <p class="text-sm text-gray-400 dark:text-gray-500">아직 댓글이 없습니다.</p>
          <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">첫 번째 댓글을 남겨보세요!</p>
        </div>
      </div>

    </div>

  </main>

  <script>
    if (typeof CommonUI !== 'undefined') CommonUI.install();

    const { createApp, ref, computed, onMounted } = Vue;

    // Thymeleaf 변수
    const guideSeq = [[${guideSeq}]];
    const adminId = /*[[${user != null ? user.adminId : ''}]]*/ '';

    createApp({
      setup() {
        const guide = ref(null);
        const isLoading = ref(true);
        const error = ref('');
        const comments = ref([]);
        const totalComments = ref(0);
        const newComment = ref('');
        const isCommentSubmitting = ref(false);
        const isLiking = ref(false);
        const replyingToCommentId = ref(null);
        const replyContent = ref('');
        const isReplySubmitting = ref(false);
        const editingCommentId = ref(null);
        const editingCommentContent = ref('');
        const isCommentUpdating = ref(false);

        /**
         * 페이지 로드 시 가이드 상세 정보를 조회한다.
         * GET /api/guide/{guideSeq}
         */
        async function loadGuide() {
          try {
            isLoading.value = true;
            error.value = '';
            const response = await axios.get(`/api/guide/${guideSeq}`);
            if (response.data?.success) {
              guide.value = response.data.result;
            } else {
              error.value = response.data?.message || '가이드를 불러올 수 없습니다.';
            }
          } catch (err) {
            console.error('가이드 조회 오류:', err);
            error.value = err.response?.data?.message || '서버와 통신 중 오류가 발생했습니다.';
          } finally {
            isLoading.value = false;
          }
        }

        /**
         * 댓글 목록을 조회한다.
         * GET /api/guide/{guideSeq}/comments
         */
        async function loadComments() {
          try {
            const response = await axios.get(`/api/guide/${guideSeq}/comments`);
            if (response.data?.success) {
              comments.value = response.data.result.comments || [];
              totalComments.value = response.data.result.totalCount || 0;
            }
          } catch (err) {
            console.error('댓글 조회 오류:', err);
          }
        }

        /**
         * 마크다운 콘텐츠를 HTML로 렌더링한다.
         * marked.js를 사용하여 변환한다.
         */
        const renderedContent = computed(() => {
          if (!guide.value || !guide.value.content) return '';
          try {
            return marked.parse(guide.value.content);
          } catch (err) {
            console.error('마크다운 렌더링 오류:', err);
            return guide.value.content;
          }
        });

        /**
         * 좋아요 버튼 토글 처리.
         * POST /api/guide/{guideSeq}/like
         */
        async function toggleLike() {
          if (!guide.value || isLiking.value) return;
          try {
            isLiking.value = true;
            const response = await axios.post(`/api/guide/${guideSeq}/like`);
            if (response.data?.success) {
              guide.value.myLiked = response.data.result.liked;
              guide.value.likeCount = response.data.result.likeCount;
              CommonUI.toast(guide.value.myLiked ? '좋아요를 눌렀습니다.' : '좋아요가 취소되었습니다.', { type: 'success' });
            } else {
              CommonUI.toast(response.data?.message || '처리 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('좋아요 오류:', err);
            CommonUI.toast(err.response?.data?.message || '처리 중 오류가 발생했습니다.', { type: 'error' });
          } finally {
            isLiking.value = false;
          }
        }

        /**
         * 가이드를 삭제한다.
         * POST /api/guide/{guideSeq}/delete
         */
        async function deleteGuide() {
          if (!confirm('정말로 이 가이드를 삭제하시겠습니까?')) return;
          try {
            const response = await axios.post(`/api/guide/${guideSeq}/delete`);
            if (response.data?.success) {
              CommonUI.toast('가이드가 삭제되었습니다.', { type: 'success' });
              setTimeout(() => {
                window.location.href = '/guide';
              }, 500);
            } else {
              CommonUI.toast(response.data?.message || '삭제 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('삭제 오류:', err);
            CommonUI.toast(err.response?.data?.message || '삭제 중 오류가 발생했습니다.', { type: 'error' });
          }
        }

        /**
         * 댓글을 등록한다.
         * POST /api/guide/{guideSeq}/comments
         */
        async function addComment() {
          if (!newComment.value.trim() || isCommentSubmitting.value) return;
          try {
            isCommentSubmitting.value = true;
            const response = await axios.post(`/api/guide/${guideSeq}/comments`, {
              content: newComment.value
            });
            if (response.data?.success) {
              newComment.value = '';
              await loadComments();
              CommonUI.toast('댓글이 등록되었습니다.', { type: 'success' });
            } else {
              CommonUI.toast(response.data?.message || '댓글 등록 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('댓글 등록 오류:', err);
            CommonUI.toast(err.response?.data?.message || '댓글 등록 중 오류가 발생했습니다.', { type: 'error' });
          } finally {
            isCommentSubmitting.value = false;
          }
        }

        /**
         * 답글 폼을 표시한다.
         *
         * @param {number} commentSeq 부모 댓글 ID
         */
        function showReplyForm(commentSeq) {
          replyingToCommentId.value = commentSeq;
          replyContent.value = '';
        }

        /**
         * 답글 폼을 닫는다.
         */
        function cancelReplyForm() {
          replyingToCommentId.value = null;
          replyContent.value = '';
        }

        /**
         * 답글을 등록한다.
         * POST /api/guide/{guideSeq}/comments (body에 parentSeq 포함)
         *
         * @param {number} parentSeq 부모 댓글 ID
         */
        async function addReply(parentSeq) {
          if (!replyContent.value.trim() || isReplySubmitting.value) return;
          try {
            isReplySubmitting.value = true;
            const response = await axios.post(`/api/guide/${guideSeq}/comments`, {
              content: replyContent.value,
              parentSeq: parentSeq
            });
            if (response.data?.success) {
              replyContent.value = '';
              replyingToCommentId.value = null;
              await loadComments();
              CommonUI.toast('답글이 등록되었습니다.', { type: 'success' });
            } else {
              CommonUI.toast(response.data?.message || '답글 등록 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('답글 등록 오류:', err);
            CommonUI.toast(err.response?.data?.message || '답글 등록 중 오류가 발생했습니다.', { type: 'error' });
          } finally {
            isReplySubmitting.value = false;
          }
        }

        /**
         * 댓글 수정을 시작한다.
         *
         * @param {number} commentSeq 댓글 ID
         * @param {string} content 기존 내용
         */
        function startEditComment(commentSeq, content) {
          editingCommentId.value = commentSeq;
          editingCommentContent.value = content;
        }

        /**
         * 댓글 수정을 취소한다.
         */
        function cancelEditComment() {
          editingCommentId.value = null;
          editingCommentContent.value = '';
        }

        /**
         * 댓글을 수정한다.
         * POST /api/guide/comments/{commentSeq}/update
         *
         * @param {number} commentSeq 댓글 ID
         */
        async function updateComment(commentSeq) {
          if (!editingCommentContent.value.trim() || isCommentUpdating.value) return;
          try {
            isCommentUpdating.value = true;
            const response = await axios.post(`/api/guide/comments/${commentSeq}/update`, {
              content: editingCommentContent.value
            });
            if (response.data?.success) {
              editingCommentId.value = null;
              editingCommentContent.value = '';
              await loadComments();
              CommonUI.toast('댓글이 수정되었습니다.', { type: 'success' });
            } else {
              CommonUI.toast(response.data?.message || '수정 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('댓글 수정 오류:', err);
            CommonUI.toast(err.response?.data?.message || '수정 중 오류가 발생했습니다.', { type: 'error' });
          } finally {
            isCommentUpdating.value = false;
          }
        }

        /**
         * 댓글을 삭제한다.
         * POST /api/guide/comments/{commentSeq}/delete
         *
         * @param {number} commentSeq 댓글 ID
         */
        async function deleteComment(commentSeq) {
          if (!confirm('정말로 이 댓글을 삭제하시겠습니까?')) return;
          try {
            const response = await axios.post(`/api/guide/comments/${commentSeq}/delete`);
            if (response.data?.success) {
              await loadComments();
              CommonUI.toast('댓글이 삭제되었습니다.', { type: 'success' });
            } else {
              CommonUI.toast(response.data?.message || '삭제 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('댓글 삭제 오류:', err);
            CommonUI.toast(err.response?.data?.message || '삭제 중 오류가 발생했습니다.', { type: 'error' });
          }
        }

        /**
         * 날짜를 한국식 포맷으로 변환한다.
         * (예: 2024-06-05)
         *
         * @param {string} dateStr ISO 날짜 문자열
         * @returns {string} 포맷된 날짜
         */
        function formatDate(dateStr) {
          if (!dateStr) return '';
          const date = new Date(dateStr);
          return date.toLocaleDateString('ko-KR', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
          });
        }

        /**
         * 파일 크기를 읽기 쉬운 형식으로 변환한다.
         * (예: 1.5 MB, 512 KB)
         *
         * @param {number} bytes 바이트 단위의 파일 크기
         * @returns {string} 포맷된 파일 크기
         */
        function formatFileSize(bytes) {
          if (!bytes) return '0 B';
          const k = 1024;
          const sizes = ['B', 'KB', 'MB', 'GB'];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        /**
         * 마크다운 HTML의 링크를 처리한다.
         * 외부 링크는 새 탭에서 열도록 설정한다.
         *
         * @param {Event} event 클릭 이벤트
         */
        function handleMarkdownLinks(event) {
          if (event.target.tagName === 'A') {
            event.target.target = '_blank';
            event.target.rel = 'noopener noreferrer';
          }
        }

        // 마크다운 본문 스타일 적용
        function applyMarkdownStyles() {
          const content = document.querySelector('.markdown-body');
          if (!content) return;

          // 제목 스타일
          content.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(el => {
            el.classList.add('font-bold', 'my-3', 'text-gray-900', 'dark:text-gray-100');
            if (el.tagName === 'H1') el.classList.add('text-2xl', 'border-b', 'border-gray-200', 'dark:border-gray-700', 'pb-2');
            if (el.tagName === 'H2') el.classList.add('text-xl', 'mt-5');
            if (el.tagName === 'H3') el.classList.add('text-lg');
          });

          // 문단 스타일
          content.querySelectorAll('p').forEach(el => {
            el.classList.add('text-gray-700', 'dark:text-gray-300', 'my-2', 'leading-relaxed');
          });

          // 코드 블록 스타일
          content.querySelectorAll('code').forEach(el => {
            if (!el.parentElement.tagName === 'PRE') {
              el.classList.add('bg-gray-100', 'dark:bg-[#2a2b2c]', 'px-1.5', 'py-0.5', 'rounded', 'text-sm', 'font-mono', 'text-red-600', 'dark:text-red-400');
            }
          });

          // Pre/code 스타일
          content.querySelectorAll('pre').forEach(el => {
            el.classList.add('bg-gray-900', 'dark:bg-[#1a1b1c]', 'text-gray-100', 'p-4', 'rounded-lg', 'overflow-x-auto', 'my-3', 'font-mono', 'text-sm');
          });

          // 리스트 스타일
          content.querySelectorAll('ul, ol').forEach(el => {
            el.classList.add('my-2', 'ml-5', 'text-gray-700', 'dark:text-gray-300');
            el.querySelectorAll('li').forEach(li => {
              li.classList.add('my-1');
            });
          });

          // 블록인용 스타일
          content.querySelectorAll('blockquote').forEach(el => {
            el.classList.add('border-l-4', 'border-gray-300', 'dark:border-gray-600', 'pl-4', 'my-3', 'text-gray-600', 'dark:text-gray-400', 'italic');
          });

          // 링크 스타일
          content.querySelectorAll('a').forEach(el => {
            el.classList.add('text-blue-600', 'dark:text-blue-400', 'hover:underline');
          });

          // 테이블 스타일
          content.querySelectorAll('table').forEach(el => {
            el.classList.add('w-full', 'border-collapse', 'my-3', 'border', 'border-gray-300', 'dark:border-gray-600');
            el.querySelectorAll('th').forEach(th => {
              th.classList.add('bg-gray-100', 'dark:bg-[#2a2b2c]', 'border', 'border-gray-300', 'dark:border-gray-600', 'px-3', 'py-2', 'text-left', 'font-semibold', 'text-gray-900', 'dark:text-gray-100');
            });
            el.querySelectorAll('td').forEach(td => {
              td.classList.add('border', 'border-gray-300', 'dark:border-gray-600', 'px-3', 'py-2', 'text-gray-700', 'dark:text-gray-300');
            });
          });

          // 수평선 스타일
          content.querySelectorAll('hr').forEach(el => {
            el.classList.add('my-4', 'border-t', 'border-gray-300', 'dark:border-gray-700');
          });
        }

        onMounted(() => {
          loadGuide();
          loadComments();
          // 마크다운 렌더링 후 스타일 적용
          setTimeout(() => {
            applyMarkdownStyles();
          }, 100);
        });

        return {
          guide, isLoading, error, comments, totalComments,
          newComment, isCommentSubmitting, isLiking,
          renderedContent,
          replyingToCommentId, replyContent, isReplySubmitting,
          editingCommentId, editingCommentContent, isCommentUpdating,
          toggleLike, deleteGuide, addComment,
          showReplyForm, cancelReplyForm, addReply,
          startEditComment, cancelEditComment, updateComment, deleteComment,
          formatDate, formatFileSize, handleMarkdownLinks
        };
      }
    }).mount('#guideDetailApp');
  </script>

</body>
</html>
