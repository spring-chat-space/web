<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - Chat Space</title>
    <link rel="stylesheet" href="/common-ui/chat-vue.css">
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-gray-900 via-slate-800 to-gray-900 flex items-center justify-center px-4"
  >
    <div class="w-full max-w-md">
      <!-- 로고 영역 -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-4 shadow-lg"
        >
          <svg
            class="w-8 h-8 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Chat Space</h1>
        <p class="text-gray-400 text-sm mt-1">관리자 포털에 로그인하세요</p>
      </div>

      <!-- 카드 영역 -->
      <div
        class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8"
      >
        <!-- 중복 로그인으로 인한 세션 만료 안내 -->
        <div
          th:if="${param.expired}"
          class="mb-5 flex items-center gap-3 bg-yellow-500/10 border border-yellow-500/30 text-yellow-400 rounded-xl px-4 py-3 text-sm"
        >
          <svg
            class="w-4 h-4 flex-shrink-0"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd"
            />
          </svg>
          <span>다른 기기에서 로그인하여 현재 세션이 만료되었습니다.</span>
        </div>

        <!-- 에러 메시지 -->
        <div
          th:if="${errorMessage}"
          class="mb-5 flex items-center gap-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 text-sm"
        >
          <svg
            class="w-4 h-4 flex-shrink-0"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
              clip-rule="evenodd"
            />
          </svg>
          <span th:text="${errorMessage}"></span>
        </div>

        <!-- 성공 메시지 -->
        <div
          th:if="${successMessage}"
          class="mb-5 flex items-center gap-3 bg-green-500/10 border border-green-500/30 text-green-400 rounded-xl px-4 py-3 text-sm"
        >
          <svg
            class="w-4 h-4 flex-shrink-0"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
              clip-rule="evenodd"
            />
          </svg>
          <span th:text="${successMessage}"></span>
        </div>

        <!-- 로그인 폼 -->
        <form
          th:action="@{/login}"
          th:object="${loginRequestVo}"
          method="post"
          class="space-y-5"
        >
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5"
              >아이디</label
            >
            <input
              type="text"
              th:field="*{adminId}"
              placeholder="아이디를 입력하세요"
              class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5"
              >비밀번호</label
            >
            <input
              type="password"
              th:field="*{password}"
              placeholder="비밀번호를 입력하세요"
              class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-200 text-sm shadow-lg shadow-blue-600/20 hover:shadow-blue-600/40 active:scale-[0.98]"
          >
            로그인
          </button>
        </form>

        <!-- 회원가입 링크 -->
        <div class="mt-6 text-center">
          <p class="text-gray-500 text-sm">
            계정이 없으신가요?
            <a
              href="/signup"
              class="text-blue-400 hover:text-blue-300 font-medium transition-colors ml-1"
              >회원가입</a
            >
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
