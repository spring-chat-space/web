<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  사이드바 프래그먼트.
  사용: th:replace="~{fragments/sidebar :: sidebar}"
  필요 모델: user (AdminUserSessionVo)
  sidebar.js가 createApp()으로 #sidebar에 Vue 앱을 마운트한다.
-->
<aside th:fragment="sidebar" id="sidebar"
       class="w-64 flex-shrink-0 flex flex-col h-full bg-[#f0f4f9] transition-all duration-300">

  <!-- 상단: 로고 + 액션 버튼 -->
  <div class="px-3 pt-4 pb-2 space-y-1">

    <!-- 로고 + 사이드바 토글 -->
    <div class="flex items-center justify-between px-3 py-2 mb-2">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <span class="font-semibold text-gray-800 text-base">Chat Space</span>
      </div>
      <!-- 사이드바 접기 버튼 -->
      <button @click="toggleSidebar" title="사이드바 접기"
              class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-[#e2e8f4] text-gray-400 hover:text-gray-600 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
        </svg>
      </button>
    </div>

    <!-- 새 채팅 버튼 -->
    <button @click="newChat"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-full hover:bg-[#e2e8f4] text-gray-700 text-sm font-medium transition-colors group">
      <svg class="w-5 h-5 text-gray-500 group-hover:text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      새 채팅
    </button>

    <!-- 채팅 검색 -->
    <div class="relative">
      <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" placeholder="채팅 검색"
             @input="debounceSearch($event.target.value)"
             class="w-full bg-transparent border border-gray-300/60 rounded-full pl-9 pr-4 py-2 text-sm text-gray-600 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400/40 focus:border-blue-400/60 transition-all"/>
    </div>
  </div>

  <!-- 도구(Tools) 영역 -->
  <div class="px-3 pt-3 pb-1">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-3 mb-1">도구</p>

    <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-[#e2e8f4] text-gray-600 text-sm transition-colors group">
      <div class="w-7 h-7 bg-purple-100 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
        </svg>
      </div>
      <span>AI 번역</span>
    </button>

    <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-[#e2e8f4] text-gray-600 text-sm transition-colors group">
      <div class="w-7 h-7 bg-green-100 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <span>문서 요약</span>
    </button>
  </div>

  <!-- 구분선 -->
  <div class="mx-4 my-2 border-t border-gray-200/70"></div>

  <!-- 최근 채팅 목록 (Vue v-for로 렌더링) -->
  <div class="flex-1 overflow-y-auto chat-history px-3 pb-2">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-3 mb-2">최근 채팅</p>

    <!-- 로딩 스피너 -->
    <div v-if="isLoading" class="flex items-center justify-center py-6">
      <div class="w-5 h-5 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- 빈 상태 -->
    <p v-else-if="rooms.length === 0" class="text-xs text-gray-400 text-center py-4">채팅 기록이 없습니다.</p>

    <!-- 채팅방 목록 -->
    <div v-else>
      <div v-for="room in rooms" :key="room.roomId"
           class="room-item relative flex items-center rounded-xl transition-colors"
           :class="currentRoomId === room.roomId ? 'bg-[#d3e3fd]' : 'hover:bg-[#e2e8f4]'">
        <button @click="openRoom(room.roomId)"
                class="flex-1 min-w-0 text-left flex items-center gap-2 px-3 py-2 text-gray-600 text-sm overflow-hidden">
          <svg class="w-4 h-4 flex-shrink-0 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span class="truncate" v-text="room.title || '새 채팅'"></span>
        </button>
        <button @click.stop="deleteRoom(room.roomId)"
                class="room-delete-btn flex items-center justify-center w-6 h-6 mr-2 rounded-md hover:bg-red-100 text-gray-400 hover:text-red-500 transition-colors flex-shrink-0">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 하단: 사용자 프로필 (팝업 드롭다운) -->
  <div class="relative px-3 pb-4 pt-2 border-t border-gray-200/70">
    <!-- 프로필 버튼 -->
    <button id="profileBtn" @click="toggleProfileMenu"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-[#e2e8f4] transition-colors">
      <!-- 아바타: 이름 첫 글자 -->
      <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center flex-shrink-0 text-white text-sm font-semibold"
           th:text="${user != null ? #strings.substring(user.adminName, 0, 1) : 'A'}">A</div>
      <div class="flex-1 text-left overflow-hidden">
        <p class="text-sm font-medium text-gray-800 truncate"
           th:text="${user != null ? user.adminName : '관리자'}">관리자</p>
        <p class="text-xs text-gray-400 truncate"
           th:text="${user != null ? user.email : ''}"></p>
      </div>
      <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
      </svg>
    </button>

    <!-- 위로 열리는 드롭다운 메뉴 -->
    <div id="profileMenu"
         v-show="isProfileMenuOpen"
         class="absolute bottom-full left-3 right-3 mb-1 bg-white rounded-2xl shadow-xl border border-gray-100 py-1.5 z-50">

      <!-- ROLE_ADMIN만 사용자 관리 메뉴 표시 -->
      <a th:if="${user != null and user.role == 'ROLE_ADMIN'}"
         href="#"
         class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        사용자 관리
      </a>

      <div th:if="${user != null and user.role == 'ROLE_ADMIN'}"
           class="my-1 border-t border-gray-100"></div>

      <form th:action="@{/logout}" method="post">
        <button type="submit"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          로그아웃
        </button>
      </form>
    </div>
  </div>
</aside>

</body>
</html>
