<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가이드 수정 - Chat Space</title>
  <link rel="stylesheet" href="/common-ui/chat-vue.css">
  <link rel="stylesheet" href="/css/chat.css">
  <!-- EasyMDE 에디터 (plugins/easymde) -->
  <link rel="stylesheet" href="/plugins/easymde/easymde.min.css">
  <!-- Font Awesome (EasyMDE 툴바 아이콘용, plugins/fontawesome) -->
  <link rel="stylesheet" href="/plugins/fontawesome/css/all.min.css">
  <script src="/vendor/vue.global.prod.js"></script>
  <script src="/vendor/axios.min.js"></script>
  <script src="/common-ui/common-ui.umd.js"></script>
  <script src="/plugins/easymde/easymde.min.js"></script>
  <script src="/vendor/marked.min.js"></script>
</head>
<body class="h-screen flex overflow-hidden bg-white dark:bg-[#131314] font-sans antialiased">

  <!-- 사이드바 프래그먼트 -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- 사이드바 접혔을 때 펼치기 버튼 -->
  <button id="sidebarToggleBtn" onclick="toggleSidebar()" title="사이드바 펼치기"
          class="absolute left-3 top-4 z-10 w-8 h-8 flex items-center justify-center bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm hover:bg-gray-50 dark:hover:bg-[#2a2b2c] text-gray-500 dark:text-gray-400 transition-all">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
    </svg>
  </button>

  <!-- ====== Vue 앱 영역 (가이드 수정) ====== -->
  <main id="guideEditApp" v-cloak class="flex-1 overflow-y-auto bg-white dark:bg-[#131314]">

    <!-- 로딩 상태 -->
    <div v-if="isLoading" class="h-full flex items-center justify-center">
      <div class="text-center">
        <svg class="w-9 h-9 spin text-blue-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <p class="text-sm font-medium text-gray-500 dark:text-gray-400">가이드를 불러오는 중...</p>
      </div>
    </div>

    <!-- 에러 상태 -->
    <div v-else-if="error" class="p-8 max-w-4xl mx-auto">
      <div class="bg-white dark:bg-[#1e1f20] border border-red-200 dark:border-red-800 rounded-2xl p-6 flex items-start gap-3">
        <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div>
          <p class="text-sm font-semibold text-red-600 dark:text-red-400">오류가 발생했습니다</p>
          <p class="text-xs text-red-600 dark:text-red-400 mt-1" v-text="error"></p>
        </div>
      </div>
    </div>

    <!-- 가이드 수정 폼 -->
    <form v-else-if="form" @submit.prevent="submitForm" class="p-8 max-w-5xl mx-auto">

      <!-- 제목 입력 (카드 없이 플랫, 하단 border만) -->
      <input v-model="form.title"
             type="text"
             placeholder="가이드 제목을 입력하세요..."
             class="w-full text-3xl font-bold text-gray-900 dark:text-gray-100 placeholder-gray-300 dark:placeholder-gray-600 bg-transparent border-0 border-b border-gray-200 dark:border-gray-700 pb-4 mb-6 focus:outline-none focus:border-blue-500" />

      <!-- 공개 설정 (인라인, 카드 없음) -->
      <div class="flex items-center justify-between mb-6 py-3 border-b border-gray-100 dark:border-gray-800">
        <span class="text-sm font-medium text-gray-700 dark:text-gray-300">공개</span>
        <button type="button"
                @click="form.isPublic = form.isPublic === 'Y' ? 'N' : 'Y'"
                class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
                :class="form.isPublic === 'Y'
                  ? 'bg-green-500 hover:bg-green-600'
                  : 'bg-gray-300 dark:bg-gray-600 hover:bg-gray-400 dark:hover:bg-gray-700'">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
                :class="form.isPublic === 'Y' ? 'translate-x-6' : 'translate-x-1'"></span>
        </button>
      </div>

      <!-- 마크다운 에디터 (카드 없음) -->
      <div class="mb-6">
        <div class="flex items-center justify-between mb-3">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300">본문</label>
          <!-- 미리보기 버튼 -->
          <button type="button"
                  @click="openPreviewModal"
                  class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 dark:text-gray-400 bg-gray-100 dark:bg-[#2a2b2c] border border-gray-200 dark:border-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-[#363738] transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            미리보기
          </button>
        </div>
        <textarea ref="editorRef"
                  v-model="form.content"
                  placeholder="마크다운 형식으로 가이드 내용을 작성하세요..."></textarea>
      </div>

      <!-- 기존 파일 목록 (카드 없이 배경 bg-gray-50 rounded-lg) -->
      <div v-if="form.existingFiles && form.existingFiles.length > 0" class="mb-6 bg-gray-50 dark:bg-[#1e1f20] rounded-xl p-4">
        <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100 mb-3 flex items-center gap-2">
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
          </svg>
          기존 파일
        </h3>
        <div class="space-y-2">
          <div v-for="file in form.existingFiles"
               :key="file.fileSeq"
               class="flex items-center justify-between p-3 rounded-lg bg-white dark:bg-[#2a2b2c] border border-gray-200 dark:border-gray-700">
            <div>
              <p class="text-sm font-medium text-gray-900 dark:text-gray-100" v-text="file.originalName"></p>
              <p class="text-xs text-gray-500 dark:text-gray-400" v-text="formatFileSize(file.fileSize)"></p>
            </div>
            <button type="button"
                    @click.prevent="deleteExistingFile(file.fileSeq)"
                    :disabled="isDeletingFile"
                    class="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 새 파일 업로드 드롭존 (카드 없음) -->
      <div class="mb-8">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">새 파일 추가</label>
        <div @click="triggerFileInput"
             @dragover.prevent="isDraggingFiles = true"
             @dragleave.prevent="isDraggingFiles = false"
             @drop.prevent="handleFileDrop"
             class="flex items-center justify-center gap-4 cursor-pointer p-8 rounded-xl border-2 border-dashed transition-all"
             :class="isDraggingFiles
               ? 'border-blue-400 bg-blue-50 dark:bg-blue-900/20'
               : 'border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-[#2a2b2c] hover:border-gray-400 dark:hover:border-gray-600'">
          <svg class="w-6 h-6 text-gray-400 dark:text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 4v16m8-8H4"/>
          </svg>
          <div>
            <p class="text-sm font-medium text-gray-700 dark:text-gray-200">파일을 드래그하거나 클릭하여 업로드</p>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">모든 파일 형식 지원, 최대 100MB</p>
          </div>
          <input ref="fileInputRef"
                 type="file"
                 multiple
                 class="hidden"
                 @change="handleFileChange" />
        </div>

        <!-- 선택된 파일 목록 -->
        <div v-if="form.newFiles && form.newFiles.length > 0" class="mt-3 space-y-2">
          <p class="text-xs text-gray-500 dark:text-gray-400 font-medium">선택된 파일:</p>
          <div v-for="(file, idx) in form.newFiles"
               :key="idx"
               class="flex items-center justify-between p-2 rounded bg-gray-100 dark:bg-[#363738] text-xs">
            <span class="text-gray-700 dark:text-gray-300 truncate" v-text="file.name"></span>
            <button type="button"
                    @click.prevent="removeNewFile(idx)"
                    class="text-gray-400 hover:text-red-500 flex-shrink-0">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 하단 액션 버튼 -->
      <div class="flex items-center justify-end gap-3 pt-6 border-t border-gray-200 dark:border-gray-700">
        <a th:href="@{'/guide/' + ${guideSeq}}"
           class="px-6 py-2.5 text-sm font-medium border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
          취소
        </a>
        <button @click="submitForm"
                :disabled="isSubmitting"
                class="flex items-center gap-2 px-6 py-2.5 text-sm font-medium rounded-lg transition-colors"
                :class="isSubmitting
                  ? 'bg-gray-100 dark:bg-[#2a2b2c] text-gray-400 dark:text-gray-600 cursor-not-allowed'
                  : 'bg-blue-600 hover:bg-blue-700 text-white'">
          <span v-if="isSubmitting" class="flex items-center gap-2">
            <svg class="w-4 h-4 spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            저장 중...
          </span>
          <span v-else>저장</span>
        </button>
      </div>

    </form>

    <!-- 미리보기 모달 -->
    <div v-if="showPreviewModal"
         class="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="closePreviewModal"></div>
      <div class="relative w-full max-w-3xl max-h-[80vh] bg-white dark:bg-[#1e1f20] rounded-2xl border border-gray-200 dark:border-gray-700 shadow-2xl flex flex-col overflow-hidden">
        <!-- 모달 헤더 -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700/50 flex-shrink-0">
          <h3 class="text-base font-semibold text-gray-900 dark:text-gray-100">미리보기</h3>
          <button @click="closePreviewModal"
                  class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-[#2a2b2c] transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <!-- 모달 콘텐츠: 마크다운 렌더링 결과 -->
        <div class="flex-1 overflow-y-auto px-8 py-6 markdown-body"
             v-html="previewHtml">
        </div>
      </div>
    </div>

  </main>

  <script>
    if (typeof CommonUI !== 'undefined') CommonUI.install();

    const { createApp, ref, computed, onMounted } = Vue;

    // Thymeleaf 변수
    const guideSeq = [[${guideSeq}]];
    const adminId = /*[[${user != null ? user.adminId : ''}]]*/ '';

    createApp({
      setup() {
        const editorRef = ref(null);
        const fileInputRef = ref(null);
        const isLoading = ref(true);
        const error = ref('');
        const isSubmitting = ref(false);
        const isDraggingFiles = ref(false);
        const isDeletingFile = ref(false);
        const showPreviewModal = ref(false);
        const form = ref(null);
        let editor = null;

        /**
         * 미리보기 모달에 표시할 마크다운 렌더링 HTML.
         * form.content가 변경될 때 자동으로 최신 내용을 반영한다.
         */
        const previewHtml = computed(() => {
          if (!showPreviewModal.value) return '';
          const content = form.value?.content || '';
          if (!content.trim()) return '<p style="color:#9ca3af;text-align:center;padding:2rem">작성된 내용이 없습니다.</p>';
          try {
            return marked.parse(content);
          } catch (e) {
            return content;
          }
        });

        /**
         * 페이지 로드 시 기존 가이드 데이터를 조회한다.
         * GET /api/guide/{guideSeq}
         */
        async function loadGuide() {
          try {
            isLoading.value = true;
            error.value = '';
            const response = await axios.get(`/api/guide/${guideSeq}`);
            if (response.data?.success) {
              const guide = response.data.result;
              form.value = {
                title: guide.title || '',
                content: guide.content || '',
                isPublic: guide.isPublic || 'N',
                existingFiles: guide.files || [],
                newFiles: [],
                fileGroupSeq: guide.fileGroupSeq || null
              };
              // form 설정 후 Vue가 textarea를 DOM에 렌더링할 때까지 대기한 뒤 에디터 초기화
              setTimeout(() => {
                initEditor();
                if (editor) {
                  editor.value(form.value.content);
                }
              }, 100);
            } else {
              error.value = response.data?.message || '가이드를 불러올 수 없습니다.';
            }
          } catch (err) {
            console.error('가이드 조회 오류:', err);
            error.value = err.response?.data?.message || '서버와 통신 중 오류가 발생했습니다.';
          } finally {
            isLoading.value = false;
          }
        }

        /**
         * EasyMDE 에디터를 초기화한다.
         */
        function initEditor() {
          if (!editorRef.value) return;
          editor = new EasyMDE({
            element: editorRef.value,
            spellChecker: false,
            autoDownloadFontAwesome: false,
            // 내장 preview/side-by-side 버튼 제거: 에디터 위 전용 미리보기 버튼으로 대체
            toolbar: [
              'bold', 'italic', 'strikethrough', '|',
              'heading', 'quote', '|',
              'unordered-list', 'ordered-list', '|',
              'link', 'image', 'code', 'table', '|',
              'undo', 'redo'
            ]
          });

          // EasyMDE의 value() 메서드로 form 내용 동기화
          editor.codemirror.on('change', () => {
            if (form.value) {
              form.value.content = editor.value();
            }
          });
        }

        /**
         * 파일 input을 트리거한다.
         */
        function triggerFileInput() {
          fileInputRef.value?.click();
        }

        /**
         * 파일 input change 이벤트를 처리한다.
         *
         * @param {Event} event 파일 선택 이벤트
         */
        function handleFileChange(event) {
          const files = event.target.files;
          if (!files) return;
          addFiles(Array.from(files));
          if (fileInputRef.value) fileInputRef.value.value = '';
        }

        /**
         * 드래그앤드롭으로 파일을 처리한다.
         *
         * @param {DragEvent} event 드롭 이벤트
         */
        function handleFileDrop(event) {
          isDraggingFiles.value = false;
          const files = event.dataTransfer?.files;
          if (!files) return;
          addFiles(Array.from(files));
        }

        /**
         * 파일들을 form의 newFiles 배열에 추가한다.
         *
         * @param {File[]} files 추가할 파일 배열
         */
        function addFiles(files) {
          if (!form.value) return;
          if (!form.value.newFiles) form.value.newFiles = [];
          form.value.newFiles.push(...files);
        }

        /**
         * 선택된 새 파일을 제거한다.
         *
         * @param {number} idx 파일 인덱스
         */
        function removeNewFile(idx) {
          if (!form.value || !form.value.newFiles) return;
          form.value.newFiles.splice(idx, 1);
        }

        /**
         * 기존 파일을 삭제한다.
         * POST /api/file/{fileSeq}/delete
         *
         * @param {number} fileSeq 파일 ID
         */
        async function deleteExistingFile(fileSeq) {
          if (!confirm('이 파일을 삭제하시겠습니까?')) return;
          try {
            isDeletingFile.value = true;
            const response = await axios.post(`/api/file/${fileSeq}/delete`);
            if (response.data?.success) {
              if (form.value) {
                form.value.existingFiles = form.value.existingFiles.filter(f => f.fileSeq !== fileSeq);
              }
              CommonUI.toast('파일이 삭제되었습니다.', { type: 'success' });
            } else {
              CommonUI.toast(response.data?.message || '삭제 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('파일 삭제 오류:', err);
            CommonUI.toast(err.response?.data?.message || '삭제 중 오류가 발생했습니다.', { type: 'error' });
          } finally {
            isDeletingFile.value = false;
          }
        }

        /**
         * 새 파일을 서버에 업로드한다.
         * POST /api/file/upload
         *
         * @returns {Promise<number>} 업로드된 fileGroupSeq
         */
        async function uploadNewFiles() {
          if (!form.value || !form.value.newFiles || form.value.newFiles.length === 0) {
            return form.value.fileGroupSeq; // 기존 fileGroupSeq 반환
          }

          try {
            const formData = new FormData();
            formData.append('groupType', 'GUIDE');
            form.value.newFiles.forEach(file => {
              formData.append('files', file);
            });

            const response = await axios.post('/api/file/upload', formData, {
              headers: { 'Content-Type': 'multipart/form-data' }
            });

            if (response.data?.success) {
              return response.data.result.fileGroupSeq;
            } else {
              throw new Error(response.data?.message || '파일 업로드 실패');
            }
          } catch (err) {
            console.error('파일 업로드 오류:', err);
            throw err;
          }
        }

        /**
         * 폼을 제출하여 가이드를 수정한다.
         * 1. 새 파일이 있으면 업로드 후 fileGroupSeq 얻기
         * 2. POST /api/guide/{guideSeq}/update
         */
        async function submitForm() {
          if (!form.value || !form.value.title.trim() || !form.value.content.trim()) {
            CommonUI.toast('제목과 본문을 모두 입력하세요.', { type: 'error' });
            return;
          }

          try {
            isSubmitting.value = true;

            // 새 파일 업로드
            let fileGroupSeq = form.value.fileGroupSeq;
            if (form.value.newFiles && form.value.newFiles.length > 0) {
              fileGroupSeq = await uploadNewFiles();
              CommonUI.toast('파일이 업로드되었습니다.', { type: 'success' });
            }

            // 가이드 수정 요청
            const response = await axios.post(`/api/guide/${guideSeq}/update`, {
              title: form.value.title,
              content: form.value.content,
              isPublic: form.value.isPublic,
              fileGroupSeq: fileGroupSeq
            });

            if (response.data?.success) {
              CommonUI.toast('가이드가 저장되었습니다.', { type: 'success' });
              setTimeout(() => {
                window.location.href = `/guide/${guideSeq}`;
              }, 500);
            } else {
              CommonUI.toast(response.data?.message || '저장 중 오류가 발생했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('가이드 수정 오류:', err);
            CommonUI.toast(err.response?.data?.message || '저장 중 오류가 발생했습니다.', { type: 'error' });
          } finally {
            isSubmitting.value = false;
          }
        }

        /**
         * 미리보기 모달을 연다.
         */
        function openPreviewModal() {
          showPreviewModal.value = true;
        }

        /**
         * 미리보기 모달을 닫는다.
         */
        function closePreviewModal() {
          showPreviewModal.value = false;
        }

        /**
         * 파일 크기를 읽기 쉬운 형식으로 변환한다.
         *
         * @param {number} bytes 바이트 단위의 파일 크기
         * @returns {string} 포맷된 파일 크기
         */
        function formatFileSize(bytes) {
          if (!bytes) return '0 B';
          const k = 1024;
          const sizes = ['B', 'KB', 'MB', 'GB'];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        onMounted(() => {
          // initEditor는 loadGuide 완료 후 form이 렌더링된 다음에 호출됨
          loadGuide();
        });

        return {
          editorRef, fileInputRef, isLoading, error, isSubmitting,
          isDraggingFiles, isDeletingFile, form,
          showPreviewModal, previewHtml,
          triggerFileInput, handleFileChange, handleFileDrop,
          removeNewFile, deleteExistingFile, submitForm, formatFileSize,
          openPreviewModal, closePreviewModal,
        };
      }
    }).mount('#guideEditApp');
  </script>

</body>
</html>
