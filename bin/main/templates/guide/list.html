<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가이드 - Chat Space</title>
  <link rel="stylesheet" href="/common-ui/chat-vue.css">
  <link rel="stylesheet" href="/css/chat.css">
  <script src="/vendor/vue.global.prod.js"></script>
  <script src="/vendor/axios.min.js"></script>
  <script src="/common-ui/common-ui.umd.js"></script>
</head>
<body class="h-screen flex overflow-hidden bg-white dark:bg-[#131314] font-sans antialiased">

  <!-- 사이드바 프래그먼트 -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- 사이드바 접혔을 때 펼치기 버튼 -->
  <button id="sidebarToggleBtn" onclick="toggleSidebar()" title="사이드바 펼치기"
          class="absolute left-3 top-4 z-10 w-8 h-8 flex items-center justify-center bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm hover:bg-gray-50 dark:hover:bg-[#2a2b2c] text-gray-500 dark:text-gray-400 transition-all">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
    </svg>
  </button>

  <!-- ====== Vue 앱 영역 (가이드 목록 메인 콘텐츠) ====== -->
  <main id="guideListApp" v-cloak class="flex-1 flex flex-col h-full overflow-hidden">

    <!-- 페이지 헤더 -->
    <div class="px-8 py-5 border-b border-gray-200 dark:border-gray-700/50 bg-white dark:bg-[#131314]">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">가이드</h1>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">다양한 가이드를 열람하고 공유할 수 있습니다.</p>
        </div>
        <!-- 새 가이드 작성 버튼 -->
        <a href="/guide/write"
           class="flex items-center gap-2 px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          새 가이드
        </a>
      </div>
    </div>

    <!-- 콘텐츠 영역 -->
    <div class="flex-1 overflow-hidden flex flex-col">

      <!-- 상단 검색 및 정렬 영역 (좌측: 정렬 탭, 우측: 검색 인풋) -->
      <div class="px-8 border-b border-gray-200 dark:border-gray-700/50 bg-white dark:bg-[#131314]">
        <div class="flex items-center justify-between">

          <!-- 좌측: 정렬 탭 (세그먼트 컨트롤 스타일) -->
          <div class="flex items-center bg-gray-100 dark:bg-[#1e1f20] rounded-lg p-1 gap-1">
            <button @click="sortType = 'like'"
                    :class="sortType === 'like'
                      ? 'bg-white dark:bg-[#2a2b2c] text-gray-900 dark:text-gray-100 shadow-sm'
                      : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'"
                    class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">
              인기순
            </button>
            <button @click="sortType = 'recent'"
                    :class="sortType === 'recent'
                      ? 'bg-white dark:bg-[#2a2b2c] text-gray-900 dark:text-gray-100 shadow-sm'
                      : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'"
                    class="px-4 py-1.5 rounded-md text-sm font-medium transition-all">
              최신순
            </button>
          </div>

          <!-- 우측: 검색 인풋 -->
          <div class="relative py-3">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </div>
            <input v-model="searchKeyword"
                   type="text"
                   placeholder="가이드 검색..."
                   class="pl-10 pr-4 py-2 w-64 bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-transparent transition-colors" />
          </div>

        </div>
      </div>

      <!-- 카드 그리드 영역 -->
      <div class="flex-1 overflow-y-auto px-8 py-6 bg-gray-50 dark:bg-[#0f1011]">

        <!-- 로딩 상태 -->
        <div v-if="isLoading" class="h-full flex items-center justify-center">
          <div class="text-center">
            <svg class="w-9 h-9 spin text-blue-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400">가이드를 불러오고 있습니다...</p>
          </div>
        </div>

        <!-- 빈 상태 -->
        <div v-else-if="guides.length === 0" class="h-full flex items-center justify-center">
          <div class="text-center">
            <div class="w-14 h-14 bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-sm">
              <svg class="w-7 h-7 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400">아직 가이드가 없습니다</p>
            <p class="text-xs text-gray-400 dark:text-gray-600 mt-1">새로운 가이드를 작성해주세요</p>
          </div>
        </div>

        <!-- 카드 그리드 -->
        <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          <div v-for="guide in pagedGuides" :key="guide.guideSeq"
               @click="navigateToGuide(guide.guideSeq)"
               class="bg-white dark:bg-[#1e1f20] border border-gray-200 dark:border-gray-700 rounded-2xl overflow-hidden cursor-pointer transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5 hover:border-gray-300 dark:hover:border-gray-600 group">

            <!-- 카드 상단: 제목 + 비공개 아이콘 + 좋아요 -->
            <div class="relative p-5 pb-4">
              <!-- 비공개 아이콘 -->
              <div v-if="guide.isPublic === 'N'"
                   class="absolute top-4 right-4 w-5 h-5 bg-amber-100 dark:bg-amber-900/30 rounded flex items-center justify-center">
                <svg class="w-3 h-3 text-amber-600 dark:text-amber-400" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.02l7 3.5v5.48c0 4.65-2.56 8.93-7 10.98-4.44-2.05-7-6.33-7-10.98v-5.48l7-3.5z"/>
                </svg>
              </div>
              <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100 line-clamp-2 mb-3 pr-6 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                {{ guide.title }}
              </h3>
              <!-- 좋아요 버튼 -->
              <button @click.stop="toggleLike(guide.guideSeq, guide.myLiked)"
                      class="flex items-center gap-1.5 text-xs font-medium transition-colors"
                      :class="guide.myLiked
                        ? 'text-red-500 dark:text-red-400'
                        : 'text-gray-400 dark:text-gray-500 hover:text-red-400 dark:hover:text-red-400'">
                <svg class="w-4 h-4" :fill="guide.myLiked ? 'currentColor' : 'none'" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                <span v-text="guide.likeCount"></span>
              </button>
            </div>

            <!-- 카드 하단: 작성자 아바타 + 이름 + 날짜 -->
            <div class="px-5 py-3.5 border-t border-gray-100 dark:border-gray-700/50 flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center flex-shrink-0">
                <span class="text-xs font-bold text-blue-600 dark:text-blue-400" v-text="guide.authorName?.charAt(0) || '?'"></span>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" v-text="guide.authorName"></p>
                <p class="text-xs text-gray-400 dark:text-gray-500" v-text="formatDate(guide.createdAt)"></p>
              </div>
            </div>

          </div>
        </div>

        <!-- 페이징 -->
        <div v-if="!isLoading && guides.length > 0" class="flex items-center justify-center gap-1 mt-8 pb-2">
          <!-- 이전 페이지 -->
          <button @click="currentPage--" :disabled="currentPage === 1"
                  class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-[#2a2b2c] disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
          </button>

          <!-- 페이지 번호 -->
          <button v-for="page in totalPages" :key="page"
                  @click="currentPage = page"
                  :class="currentPage === page
                    ? 'bg-blue-600 text-white border-blue-600'
                    : 'border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-[#2a2b2c]'"
                  class="w-8 h-8 flex items-center justify-center rounded-lg border text-sm font-medium transition-colors">
            {{ page }}
          </button>

          <!-- 다음 페이지 -->
          <button @click="currentPage++" :disabled="currentPage === totalPages"
                  class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-[#2a2b2c] disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>
        </div>

      </div>
    </div>

  </main>

  <script>
    if (typeof CommonUI !== 'undefined') CommonUI.install();

    const { createApp, ref, watch, computed, onMounted } = Vue;

    createApp({
      setup() {
        // ─── 상태 (ref로 선언) ───
        const adminId           = /*[[${user != null ? user.adminId : ''}]]*/ '';
        const guides            = ref([]);
        const isLoading         = ref(false);
        const searchKeyword     = ref('');
        const sortType          = ref('like');  // 'like' 또는 'recent'
        const currentPage       = ref(1);
        const PAGE_SIZE         = 6;

        /** 현재 페이지에 표시할 가이드 슬라이스 */
        const pagedGuides = computed(() => {
          const start = (currentPage.value - 1) * PAGE_SIZE;
          return guides.value.slice(start, start + PAGE_SIZE);
        });

        /** 전체 페이지 수 */
        const totalPages = computed(() => Math.max(1, Math.ceil(guides.value.length / PAGE_SIZE)));
        /**
         * 날짜를 'YYYY-MM-DD' 형식으로 포맷한다.
         *
         * @param {string|number|Date} date 날짜 값
         * @returns {string} 포맷된 날짜
         */
        function formatDate(date) {
          if (!date) return '-';
          const d = new Date(date);
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        }

        /**
         * 가이드 목록을 API에서 조회한다.
         * searchKeyword와 sortType 변경 시 자동 호출된다.
         */
        async function loadGuides() {
          if (isLoading.value) return;
          isLoading.value = true;

          try {
            const params = new URLSearchParams();
            params.append('sort', sortType.value);  // 'like' 또는 'recent'
            if (searchKeyword.value.trim()) {
              params.append('keyword', searchKeyword.value.trim());
            }

            const response = await axios.get(`/api/guide/list?${params.toString()}`);

            if (response.data?.success) {
              guides.value = response.data.result ?? [];
            } else {
              CommonUI.toast(response.data?.message || '가이드 로드에 실패했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('가이드 로드 오류:', err);
            CommonUI.toast(err.response?.data?.message || '서버와 통신 중 오류가 발생했습니다.', { type: 'error' });
          } finally {
            isLoading.value = false;
          }
        }

        /**
         * 검색 키워드 변경 시 디바운싱하여 API 호출 (300ms)
         */
        let searchDebounceTimer = null;
        watch(searchKeyword, () => {
          clearTimeout(searchDebounceTimer);
          searchDebounceTimer = setTimeout(() => {
            currentPage.value = 1;
            loadGuides();
          }, 300);
        });

        /**
         * 정렬 방식 변경 시 1페이지로 리셋 후 즉시 API 호출
         */
        watch(sortType, () => {
          currentPage.value = 1;
          loadGuides();
        });

        /**
         * 가이드 상세 페이지로 이동한다.
         *
         * @param {number} guideSeq 가이드 시퀀스
         */
        function navigateToGuide(guideSeq) {
          window.location.href = `/guide/${guideSeq}`;
        }

        /**
         * 좋아요를 토글한다.
         * POST /api/guide/{guideSeq}/like 단일 엔드포인트 호출 (서버에서 토글 처리)
         *
         * @param {number} guideSeq 가이드 시퀀스
         * @param {boolean} currentlyLiked 현재 좋아요 상태 (낙관적 UI 업데이트용)
         */
        async function toggleLike(guideSeq, currentlyLiked) {
          try {
            const response = await axios.post(`/api/guide/${guideSeq}/like`);

            if (response.data?.success) {
              // 가이드 목록 재조회
              await loadGuides();
            } else {
              CommonUI.toast(response.data?.message || '좋아요 처리에 실패했습니다.', { type: 'error' });
            }
          } catch (err) {
            console.error('좋아요 처리 오류:', err);
            CommonUI.toast(err.response?.data?.message || '서버와 통신 중 오류가 발생했습니다.', { type: 'error' });
          }
        }

        // ─── 라이프사이클 ───
        onMounted(() => {
          loadGuides();
        });

        // ─── 반환: 템플릿에 노출할 항목 ───
        return {
          adminId,
          guides,
          isLoading,
          searchKeyword,
          sortType,
          currentPage,
          totalPages,
          pagedGuides,
          formatDate,
          navigateToGuide,
          toggleLike,
        };
      }
    }).mount('#guideListApp');
  </script>

</body>
</html>
