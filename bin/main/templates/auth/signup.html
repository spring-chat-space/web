<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - Chat Space</title>
    <script src="/vendor/tailwindcss.js"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-gray-900 via-slate-800 to-gray-900 flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md">

      <!-- 로고 영역 -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-4 shadow-lg">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">계정 만들기</h1>
        <p class="text-gray-400 text-sm mt-1">Chat Space 관리자 계정을 등록하세요</p>
      </div>

      <!-- 카드 영역 -->
      <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8">

        <!-- 서버 측 에러 메시지 (리다이렉트로 전달된 flash) -->
        <div th:if="${errorMessage}"
             class="mb-5 flex items-center gap-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 text-sm">
          <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                  clip-rule="evenodd"/>
          </svg>
          <span th:text="${errorMessage}"></span>
        </div>

        <!-- JS 클라이언트 사이드 유효성 에러 -->
        <div id="jsError" class="hidden mb-5 flex items-center gap-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 text-sm">
          <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                  clip-rule="evenodd"/>
          </svg>
          <span id="jsErrorMsg"></span>
        </div>

        <!-- 회원가입 폼 -->
        <form th:action="@{/signup}" th:object="${signupRequestVo}" method="post"
              onsubmit="return validateForm()" class="space-y-4">

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">아이디</label>
            <input id="adminId" type="text" th:field="*{adminId}"
                   placeholder="사용할 아이디를 입력하세요"
                   class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"/>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">비밀번호</label>
            <input id="password" type="password" th:field="*{password}"
                   placeholder="비밀번호를 입력하세요"
                   class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"/>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">이름</label>
            <input id="adminName" type="text" th:field="*{adminName}"
                   placeholder="이름을 입력하세요"
                   class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"/>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">이메일</label>
            <input id="email" type="email" th:field="*{email}"
                   placeholder="이메일 주소를 입력하세요"
                   class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"/>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">전화번호</label>
            <input id="phoneNumber" type="tel" th:field="*{phoneNumber}"
                   placeholder="010-1234-5678"
                   oninput="formatPhoneNumber(this)"
                   maxlength="13"
                   class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all"/>
            <p class="text-xs text-gray-500 mt-1">입력 시 하이픈(-)이 자동으로 추가됩니다</p>
          </div>

          <div class="pt-1">
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-200 text-sm shadow-lg shadow-blue-600/20 hover:shadow-blue-600/40 active:scale-[0.98]">
              회원가입
            </button>
          </div>
        </form>

        <!-- 로그인 링크 -->
        <div class="mt-6 text-center">
          <p class="text-gray-500 text-sm">
            이미 계정이 있으신가요?
            <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium transition-colors ml-1">로그인</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      /**
       * 전화번호 자동 하이픈 포맷 (010-1234-5678 형식).
       * 숫자만 추출 후 패턴에 맞게 재포맷한다.
       *
       * @param {HTMLInputElement} input - 전화번호 입력 필드
       */
      function formatPhoneNumber(input) {
        // 숫자만 추출
        const digits = input.value.replace(/\D/g, '');

        // 패턴별 하이픈 삽입
        if (digits.length <= 3) {
          input.value = digits;
        } else if (digits.length <= 7) {
          // 010-XXXX
          input.value = digits.slice(0, 3) + '-' + digits.slice(3);
        } else {
          // 010-XXXX-XXXX
          input.value = digits.slice(0, 3) + '-' + digits.slice(3, 7) + '-' + digits.slice(7, 11);
        }
      }

      /**
       * 폼 제출 전 클라이언트 사이드 유효성 검사.
       * 빈 필드 체크와 전화번호 형식 검증을 수행한다.
       *
       * @returns {boolean} 검증 통과 시 true, 실패 시 false
       */
      function validateForm() {
        const fields = [
          { id: 'adminId',     label: '아이디' },
          { id: 'password',    label: '비밀번호' },
          { id: 'adminName',   label: '이름' },
          { id: 'email',       label: '이메일' },
          { id: 'phoneNumber', label: '전화번호' },
        ];

        // 빈 필드 검사
        for (const field of fields) {
          const val = document.getElementById(field.id).value.trim();
          if (!val) {
            showJsError(`${field.label}을(를) 입력해주세요.`);
            document.getElementById(field.id).focus();
            return false;
          }
        }

        // 전화번호 형식 검사 (01X-XXXX-XXXX)
        const phone = document.getElementById('phoneNumber').value;
        const phoneRegex = /^01([0|1|6|7|8|9])-([0-9]{3,4})-([0-9]{4})$/;
        if (!phoneRegex.test(phone)) {
          showJsError('올바른 휴대폰 번호 형식이 아닙니다. (예: 010-1234-5678)');
          document.getElementById('phoneNumber').focus();
          return false;
        }

        return true;
      }

      /**
       * JS 에러 메시지 표시.
       *
       * @param {string} msg - 표시할 에러 메시지
       */
      function showJsError(msg) {
        document.getElementById('jsErrorMsg').textContent = msg;
        document.getElementById('jsError').classList.remove('hidden');
      }
    </script>
  </body>
</html>
